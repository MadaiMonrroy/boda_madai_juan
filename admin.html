<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confirmaciones de Boda</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;font-weight:300;background:#f0ece3;color:#3a3228;min-height:100vh}
header{background:#2d3a2e;padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between}
header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#e8dfc8;font-style:italic}
header p{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#8a9e7a}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:1.5rem 2rem}
.stat-card{background:white;border:1px solid #ddd5c2;padding:1.25rem;text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:#2d3a2e;display:block;line-height:1}
.stat-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#a89f7e;display:block;margin-top:.3rem}
.section{padding:0 2rem 2rem}
.section h2{font-family:'Cormorant Garamond',serif;font-size:20px;color:#2d3a2e;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #ddd5c2}
table{width:100%;border-collapse:collapse;background:white;font-size:12px}
th{background:#2d3a2e;color:#c9b99a;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;padding:10px 12px;text-align:left;font-weight:400}
td{padding:10px 12px;border-bottom:1px solid #ede6d8;vertical-align:middle}
tr:hover td{background:#f9f7f3}
.badge{display:inline-block;font-size:9px;padding:3px 8px;letter-spacing:1px;background:#f0ece3;color:#8a7e6a;border:1px solid #ddd5c2}
.btn-del{background:none;border:1px solid #ddd5c2;padding:4px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#c9b99a;cursor:pointer;font-family:'Montserrat',sans-serif}
.btn-del:hover{background:#f7f3ec;border-color:#c9b99a;color:#8a7e6a}
.empty{text-align:center;padding:3rem;color:#a89f7e;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:18px}
.refresh-btn{background:#2d3a2e;color:#e8dfc8;border:none;padding:8px 18px;font-size:8px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif}
.refresh-btn:hover{background:#3d4e3e}
#last-updated{font-size:9px;color:#a89f7e;margin-left:.75rem}
</style>
</head>
<body>
<header>
  <div>
    <h1>Panel de Administración</h1>
    <p>Sofía &amp; Mateo · 15 · XI · 2026</p>
  </div>
  <div style="text-align:right">
    <button class="refresh-btn" onclick="load()">↻ Actualizar</button>
    <span id="last-updated"></span>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="section">
  <h2>Confirmaciones</h2>
  <div id="table-wrap"><p class="empty">Cargando…</p></div>
</div>

<script>
async function load() {
  try {
    const [rsvps, stats] = await Promise.all([
      fetch('/api/rsvp').then(r => r.json()),
      fetch('/api/stats').then(r => r.json())
    ]);
    renderStats(stats);
    renderTable(rsvps);
    document.getElementById('last-updated').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es');
  } catch(e) {
    document.getElementById('table-wrap').innerHTML =
      '<p class="empty">Error al conectar con el servidor.<br>¿Está corriendo node server.js?</p>';
  }
}

function renderStats(s) {
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><span class="stat-num">${s.confirmados}</span><span class="stat-lbl">Confirmados</span></div>
    <div class="stat-card"><span class="stat-num">${s.acompanantes}</span><span class="stat-lbl">Acompañantes</span></div>
    <div class="stat-card"><span class="stat-num">${s.total_asistentes}</span><span class="stat-lbl">Total Asistentes</span></div>
  `;
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<p class="empty">Aún no hay confirmaciones</p>';
    return;
  }
  const menuLabel = {estandar:'Estándar',vegetariano:'Vegetariano',vegano:'Vegano',singluten:'Sin Gluten','':`—`};
  let html = `<table>
    <thead><tr>
      <th>#</th><th>Nombre</th><th>Email</th><th>Teléfono</th>
      <th>Acomp.</th><th>Menú</th><th>Notas</th><th>Fecha</th><th></th>
    </tr></thead><tbody>`;
  rows.forEach(r => {
    html += `<tr>
      <td style="color:#a89f7e">${r.id}</td>
      <td style="font-weight:400">${esc(r.name)}</td>
      <td style="color:#8a7e6a">${esc(r.email)||'—'}</td>
      <td>${esc(r.phone)||'—'}</td>
      <td style="text-align:center"><span class="badge">${r.guests}</span></td>
      <td><span class="badge">${menuLabel[r.menu]||r.menu||'—'}</span></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.notes)||'—'}</td>
      <td style="color:#a89f7e;white-space:nowrap;font-size:11px">${r.created_at}</td>
      <td><button class="btn-del" onclick="del(${r.id})">Eliminar</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

async function del(id) {
  if (!confirm('¿Eliminar esta confirmación?')) return;
  await fetch('/api/rsvp/' + id, { method: 'DELETE' });
  load();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
setInterval(load, 30000); // auto-refresh cada 30s
</script>
</body>
</html>
